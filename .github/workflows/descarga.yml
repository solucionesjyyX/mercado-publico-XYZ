name: Descarga Compra Agil cada hora

on:
  schedule:
    # Cambiado al minuto 15 para evitar la saturación de los servidores de GitHub en el minuto 0
    - cron: '15 * * * *'
  workflow_dispatch:

# CRÍTICO: Esto le da permiso al bot para modificar y subir el archivo al repositorio
permissions:
  contents: write

jobs:
  descarga:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calcular fechas
        id: fechas
        run: |
          DESDE=$(date -d '-1 month' +%F)
          HASTA=$(date -d '+1 month' +%F)
          echo "desde=$DESDE" >> $GITHUB_OUTPUT
          echo "hasta=$HASTA" >> $GITHUB_OUTPUT

      - name: Pedir link de descarga a la API
        run: |
          RESPONSE=$(curl -s "https://api.buscador.mercadopublico.cl/compra-agil?action=download-excel&max_budget=7500000&min_budget=1&date_from=${{ steps.fechas.outputs.desde }}&date_to=${{ steps.fechas.outputs.hasta }}&order_by=closing_soon&status=2" \
            -H "accept: application/json, text/plain, */*" \
            -H "origin: https://buscador.mercadopublico.cl" \
            -H "referer: https://buscador.mercadopublico.cl/" \
            -H "x-api-key: e93089e4-437c-4723-b343-4fa20045e3bc")
          echo "$RESPONSE" > respuesta.json
          cat respuesta.json

      - name: Extraer URL del excel y descargarlo
        run: |
          URL=$(cat respuesta.json | grep -oE 'https://[^"]+\.xlsx[^"]*')
          echo "URL encontrada: $URL"
          if [ -z "$URL" ]; then
            echo "Error: No se encontró URL en la respuesta de la API"
            exit 1
          fi
          curl -s -o compra_agil.xlsx "$URL"

      - name: Commit y push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add compra_agil.xlsx
          
          # Solo hace commit si hay cambios reales en el archivo
          if ! git diff --cached --quiet; then
            git commit -m "Actualización $(date +'%F %T') rango ${{ steps.fechas.outputs.desde }} a ${{ steps.fechas.outputs.hasta }}"
            git pull --rebase origin main
            git push origin main
          else
            echo "El archivo no ha cambiado desde la última descarga."
          fi
